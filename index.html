<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gespräch mit Marco</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-image: url('./background.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            position: relative;
            background-color: #0f1118;
        }

        /*
        =====================================
        HEYGEN PORTRAIT WINDOW
        =====================================
        */

        .avatar-window {
            position: absolute;

            /* zentriert auf dem Mockup */
            left: 50%;
            top: 49.5%;

            transform: translate(-50%, -50%);

            /*
            Diese Werte passen ungefähr
            auf das letzte Mockup.
            */

            width: 18.4vw;
            height: 59vh;

            border-radius: 28px;
            overflow: hidden;

            background: #ffffff;

            z-index: 100;
        }

        .avatar-window iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /*
        Mobile Fallback
        */

        @media (max-width: 1200px) {

            .avatar-window {
                width: 24vw;
                height: 62vh;
            }

        }

        @media (max-width: 900px) {

            .avatar-window {
                width: 38vw;
                height: 68vh;
            }

        }

        @media (max-width: 600px) {

            .avatar-window {
                width: 52vw;
                height: 72vh;
            }

        }
    </style>
</head>

<body>

    <div class="avatar-window">

        <!--
        HEYGEN EMBED HIER EINFÜGEN
        -->

      <iframe src="https://embed.liveavatar.com/v1/e336c2cb-65ef-44c9-b91d-9591d18f4631?orientation=vertical" allow="microphone" title="LiveAvatar Embed" style="aspect-ratio: 9/16;"></iframe>

        <!--
        Falls HeyGen keinen iframe liefert,
        sondern Script + Div,
        einfach diesen gesamten Block ersetzen.
        -->

    </div>

</body>

</html>
